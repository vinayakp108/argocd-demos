apiVersion: apps/v1
kind: Deployment
metadata:
  name: apache
  namespace: default  # लक्षात ठेवून तुझ्या ArgoCD प्रोजेक्ट नुसार ही namespace बदल!
spec:
  replicas: 4
  selector:
    matchLabels:
      app: apache
  template:
    metadata:
      labels:
        app: apache
    spec:
      containers:
      - name: apache
        image: httpd:2.4
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        # कंटेनर सुरू झाल्यावर सुंदर वेबपेज तयार करण्यासाठी खालील कोड जोडला आहे:
        lifecycle:
          postStart:
            exec:
              command:
              - "/bin/sh"
              - "-c"
              - |
                cat << 'EOF' > /usr/local/apache2/htdocs/index.html
                <!DOCTYPE html>
                <html lang="mr">
                <head>
                    <meta charset="UTF-8">
                    <title>Welcome Vinayak</title>
                    <style>
                        body {
                            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
                            color: white;
                            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                            display: flex;
                            flex-direction: column;
                            align-items: center;
                            justify-content: center;
                            height: 100vh;
                            margin: 0;
                            overflow: hidden;
                        }
                        .container {
                            text-align: center;
                            padding: 30px;
                            border-radius: 15px;
                            background: rgba(255, 255, 255, 0.1);
                            backdrop-filter: blur(10px);
                            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
                            border: 1px solid rgba(255, 255, 255, 0.2);
                            animation: fadeIn 1.5s ease-out;
                        }
                        h1 {
                            font-size: 3.5rem;
                            margin-bottom: 10px;
                            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
                            letter-spacing: 2px;
                        }
                        p {
                            font-size: 1.5rem;
                            color: #e0e0e0;
                        }
                        /* एक इंटरॲक्टिव्ह फिरणारा क्युब */
                        .spinner {
                            width: 50px;
                            height: 50px;
                            background-color: #00ffcc;
                            margin: 30px auto;
                            animation: rotate 2s infinite ease-in-out;
                            border-radius: 10px;
                            box-shadow: 0 0 15px #00ffcc;
                        }
                        @keyframes fadeIn {
                            from { opacity: 0; transform: translateY(-20px); }
                            to { opacity: 1; transform: translateY(0); }
                        }
                        @keyframes rotate {
                            0% { transform: scale(0.5) rotate(0deg); }
                            50% { transform: scale(1) rotate(180deg); background-color: #ff007f; box-shadow: 0 0 15px #ff007f; }
                            100% { transform: scale(0.5) rotate(360deg); }
                        }
                    </style>
                </head>
                <body>
                    <div class="container">
                        <h1>Hello Vinayak Pujare! 👋</h1>
                        <p>Working as Senior System Administrator.</p>
                        <p>Welcome to your Interactive DevOps Server.</p>
                        <div class="spinner"></div>
                        <p style="font-size: 1rem; color: #a0a0a0;">Powered by Apache on Kubernetes (Kind Cluster)</p>
                    </div>
                </body>
                </html>
                EOF

